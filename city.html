<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SE Map — 도시</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="blob-field">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <div class="app">
    <header class="top-nav">
      <a class="brand" href="index.html"><span class="brand-dot"></span>SE Map</a>
      <nav class="nav-links">
        <a href="index.html" class="active">지도</a>
        <a href="route.html">루트</a>
        <a href="culture.html">문화</a>
      </nav>
      <div class="nav-utility">
        <button class="pill icon-btn" id="export-btn" title="방문 기록 내보내기">⇩<span class="btn-label"> 내보내기</span></button>
        <button class="pill icon-btn" id="import-btn" title="방문 기록 가져오기">⇧<span class="btn-label"> 가져오기</span></button>
        <input type="file" id="import-file" accept="application/json" hidden />
        <button class="theme-toggle" id="theme-toggle" title="테마 전환">◐</button>
      </div>
    </header>

    <main>
      <div class="back-row">
        <a class="pill" id="back-link" href="index.html">← 지도로</a>
      </div>
      <div class="country-head">
        <p class="eyebrow" id="city-eyebrow"></p>
        <h1 id="city-title"></h1>
        <p class="country-stats" id="city-stats"></p>
      </div>

      <div class="attraction-grid" id="attraction-grid"></div>
      <p class="empty-state" id="city-empty" hidden></p>
    </main>
  </div>

  <script src="js/data-portugal.js"></script>
  <script src="js/data-france.js"></script>
  <script src="js/data-spain.js"></script>
  <script src="js/data-greece.js"></script>
  <script src="js/data-italy.js"></script>
  <script src="js/data-morocco.js"></script>
  <script src="js/images.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/route.js"></script>
  <script src="js/visited.js"></script>
  <script src="js/city-app.js"></script>
</body>
</html>
